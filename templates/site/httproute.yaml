{{- range .Values.sites }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: "{{ .name }}-nginx-route"
spec:
  parentRefs:
    - name: {{ $.Values.gatewayApi.parentRef.name }}
      namespace: {{ $.Values.gatewayApi.parentRef.namespace }}
  hostnames:
    {{- range .urls }}
    - {{ . }}
    {{- end}}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: "{{ $.Values.nginx.name }}-svc"
          port: {{ $.Values.nginx.port }}
{{- end }}
